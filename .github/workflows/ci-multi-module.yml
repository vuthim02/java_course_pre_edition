name: CI (multi-module)

on:
  push:
    branches: [main]
    paths:
      - "projects/advanced/**"
      - "projects/elite/**"
  pull_request:
    branches: [main]
    paths:
      - "projects/advanced/**"
      - "projects/elite/**"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        root:
          - projects/advanced/01-microservices-platform
          - projects/elite/02-multi-tenant-saas
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build with Maven
        run: mvn clean verify -f ${{ matrix.root }}/pom.xml
