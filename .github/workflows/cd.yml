name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - projects/intermediate/03-ecommerce
          - projects/intermediate/04-social-media
          - projects/advanced/01-microservices-platform
          - projects/elite/02-multi-tenant-saas
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build JAR
        run: mvn clean package -DskipTests -f ${{ matrix.project }}/pom.xml

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.project }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.project }}:${{ github.ref_name }}

      - name: Deploy to Kubernetes
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl set image deployment/${{ matrix.project }} ${{ matrix.project }}=${{ secrets.DOCKER_USERNAME }}/${{ matrix.project }}:${{ github.ref_name }} --record
