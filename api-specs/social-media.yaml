openapi: 3.0.3
info:
  title: Social Media Platform API
  version: 1.0.0
  description: Social media API with posts, likes, comments, friendships, news feed, and notifications.
  contact:
    name: Java by BroCode
    url: https://github.com/anomalyco/collection_of_Courses

servers:
  - url: http://localhost:8080
    description: Development server

x-webSocket:
  description: STOMP WebSocket endpoint
  endpoint: /ws
  topics:
    - /topic/feed
    - /topic/notifications
    - /queue/messages

tags:
  - name: Posts
    description: Post CRUD and interactions
  - name: Friendships
    description: Friend request management
  - name: Feed
    description: News feed
  - name: Notifications
    description: User notifications

paths:
  /api/posts:
    post:
      summary: Create a new post
      operationId: createPost
      tags:
        - Posts
      parameters:
        - name: content
          in: query
          required: true
          schema:
            type: string
            maxLength: 5000
        - name: imageUrl
          in: query
          schema:
            type: string
            format: uri
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/posts/{postId}:
    get:
      summary: Get post by ID
      operationId: getPost
      tags:
        - Posts
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Post found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete a post
      operationId: deletePost
      tags:
        - Posts
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Post deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/posts/user/{userId}:
    get:
      summary: Get posts by user
      operationId: getUserPosts
      tags:
        - Posts
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: User's posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/posts/{postId}/like:
    post:
      summary: Like a post
      operationId: likePost
      tags:
        - Posts
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Post liked
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Unlike a post
      operationId: unlikePost
      tags:
        - Posts
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Post unliked
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/posts/{postId}/comments:
    post:
      summary: Add comment to post
      operationId: addComment
      tags:
        - Posts
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: content
          in: query
          required: true
          schema:
            type: string
            maxLength: 2000
      responses:
        '201':
          description: Comment added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/friendships/request:
    post:
      summary: Send friend request
      operationId: sendFriendRequest
      tags:
        - Friendships
      parameters:
        - name: addresseeId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Friend request sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Friendship'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/friendships:
    get:
      summary: Get user's friends
      operationId: getFriends
      tags:
        - Friendships
      responses:
        '200':
          description: List of friends
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/Friendship'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/friendships/pending:
    get:
      summary: Get pending friend requests
      operationId: getPendingRequests
      tags:
        - Friendships
      responses:
        '200':
          description: Pending requests
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/Friendship'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/friendships/{friendshipId}:
    delete:
      summary: Remove a friend
      operationId: removeFriend
      tags:
        - Friendships
      parameters:
        - name: friendshipId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Friend removed
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/friendships/{friendshipId}/accept:
    put:
      summary: Accept friend request
      operationId: acceptFriendRequest
      tags:
        - Friendships
      parameters:
        - name: friendshipId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Friendship'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/friendships/{friendshipId}/reject:
    put:
      summary: Reject friend request
      operationId: rejectFriendRequest
      tags:
        - Friendships
      parameters:
        - name: friendshipId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Request rejected
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/feed:
    get:
      summary: Get news feed for current user
      operationId: getFeed
      tags:
        - Feed
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: News feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/notifications:
    get:
      summary: Get all notifications
      operationId: getNotifications
      tags:
        - Notifications
      responses:
        '200':
          description: Notifications list
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/Notification'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/notifications/unread:
    get:
      summary: Get unread notifications
      operationId: getUnreadNotifications
      tags:
        - Notifications
      responses:
        '200':
          description: Unread notifications
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/Notification'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/notifications/unread-count:
    get:
      summary: Get unread notification count
      operationId: getUnreadCount
      tags:
        - Notifications
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: integer
                example: 3
        '500':
          $ref: '#/components/responses/InternalError'

  /api/notifications/{notificationId}/read:
    put:
      summary: Mark notification as read
      operationId: markNotificationRead
      tags:
        - Notifications
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Marked as read
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/notifications/read-all:
    put:
      summary: Mark all notifications as read
      operationId: markAllNotificationsRead
      tags:
        - Notifications
      responses:
        '200':
          description: All marked as read
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: jane@example.com
        username:
          type: string
          example: jane_doe
        displayName:
          type: string
          example: Jane Doe
        bio:
          type: string
          example: Software developer & photographer
        profileImageUrl:
          type: string
          format: uri
          example: https://example.com/avatars/jane.jpg
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    Post:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        author:
          $ref: '#/components/schemas/User'
        content:
          type: string
          example: Hello world! This is my first post.
        imageUrl:
          type: string
          format: uri
          example: https://example.com/images/post1.jpg
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        likes:
          type: array
          items:
            $ref: '#/components/schemas/Like'

    Comment:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        author:
          $ref: '#/components/schemas/User'
        content:
          type: string
          example: Great post!
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T11:00:00

    Like:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        user:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:35:00

    Friendship:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        requester:
          $ref: '#/components/schemas/User'
        addressee:
          $ref: '#/components/schemas/User'
        status:
          type: string
          enum:
            - PENDING
            - ACCEPTED
            - REJECTED
          example: PENDING
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        user:
          $ref: '#/components/schemas/User'
        type:
          type: string
          example: LIKE
        message:
          type: string
          example: Jane Doe liked your post
        read:
          type: boolean
          example: false
        referenceId:
          type: string
          example: post_123
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:35:00

    PageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 10
        totalElements:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 10
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Invalid input
        path:
          type: string
          example: /api/posts
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
