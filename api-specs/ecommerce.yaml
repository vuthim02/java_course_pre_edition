openapi: 3.0.3
info:
  title: E-commerce Platform API
  version: 1.0.0
  description: Full-featured e-commerce API with product catalog, shopping cart, order management, and admin endpoints.
  contact:
    name: Java by BroCode
    url: https://github.com/anomalyco/collection_of_Courses

servers:
  - url: http://localhost:8080
    description: Development server

tags:
  - name: Products
    description: Public product catalog endpoints
  - name: Cart
    description: Shopping cart management
  - name: Orders
    description: Order placement and tracking
  - name: Admin
    description: Admin-only management endpoints

paths:
  /api/products:
    get:
      summary: Get paginated list of products
      operationId: getAllProducts
      tags:
        - Products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/products/{id}:
    get:
      summary: Get product by ID
      operationId: getProductById
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/products/category/{categoryId}:
    get:
      summary: Get products by category
      operationId: getProductsByCategory
      tags:
        - Products
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Paginated products by category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/products/search:
    get:
      summary: Search products by name and price range
      operationId: searchProducts
      tags:
        - Products
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
            format: double
        - name: maxPrice
          in: query
          schema:
            type: number
            format: double
      responses:
        '200':
          description: Search results
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/ProductResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/cart:
    get:
      summary: Get current user's cart
      operationId: getCart
      tags:
        - Cart
      responses:
        '200':
          description: User's cart with items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Clear all items from cart
      operationId: clearCart
      tags:
        - Cart
      responses:
        '204':
          description: Cart cleared
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/cart/items:
    post:
      summary: Add item to cart
      operationId: addCartItem
      tags:
        - Cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
      responses:
        '200':
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/cart/items/{itemId}:
    put:
      summary: Update cart item quantity
      operationId: updateCartItemQuantity
      tags:
        - Cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: quantity
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Quantity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Remove item from cart
      operationId: removeCartItem
      tags:
        - Cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/orders:
    post:
      summary: Create order from cart
      operationId: createOrder
      tags:
        - Orders
      parameters:
        - name: shippingAddress
          in: query
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      summary: Get current user's orders
      operationId: getUserOrders
      tags:
        - Orders
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: User's orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/orders/{orderId}:
    get:
      summary: Get order by ID
      operationId: getOrder
      tags:
        - Orders
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/products:
    post:
      summary: Create a new product (Admin)
      operationId: adminCreateProduct
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/products/{id}:
    put:
      summary: Update a product (Admin)
      operationId: adminUpdateProduct
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete a product (Admin)
      operationId: adminDeleteProduct
      tags:
        - Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/orders:
    get:
      summary: Get all orders (Admin)
      operationId: adminGetAllOrders
      tags:
        - Admin
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: All orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/orders/{orderId}/status:
    patch:
      summary: Update order status (Admin)
      operationId: adminUpdateOrderStatus
      tags:
        - Admin
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum:
              - PENDING
              - CONFIRMED
              - SHIPPED
              - DELIVERED
              - CANCELLED
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Wireless Bluetooth Headphones
        description:
          type: string
          example: High-quality wireless headphones with noise cancelling
        price:
          type: number
          format: double
          example: 79.99
        stockQuantity:
          type: integer
          example: 150
        imageUrl:
          type: string
          format: uri
          example: https://example.com/images/headphones.jpg
        category:
          $ref: '#/components/schemas/Category'

    ProductRequest:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          example: Wireless Bluetooth Headphones
        description:
          type: string
          example: High-quality wireless headphones with noise cancelling
        price:
          type: number
          format: double
          example: 79.99
        stockQuantity:
          type: integer
          example: 150
        imageUrl:
          type: string
          format: uri
          example: https://example.com/images/headphones.jpg
        categoryId:
          type: integer
          format: int64
          example: 1

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Wireless Bluetooth Headphones
        description:
          type: string
          example: High-quality wireless headphones with noise cancelling
        price:
          type: number
          format: double
          example: 79.99
        stockQuantity:
          type: integer
          example: 150
        imageUrl:
          type: string
          format: uri
          example: https://example.com/images/headphones.jpg
        categoryName:
          type: string
          example: Electronics
        categoryId:
          type: integer
          format: int64
          example: 1

    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Electronics
        description:
          type: string
          example: Electronic devices and accessories

    Cart:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        user:
          $ref: '#/components/schemas/User'
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'

    CartItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: integer
          example: 2

    CartItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          format: int64
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    CartItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        productId:
          type: integer
          format: int64
          example: 1
        productName:
          type: string
          example: Wireless Bluetooth Headphones
        productPrice:
          type: number
          format: double
          example: 79.99
        quantity:
          type: integer
          example: 2
        subtotal:
          type: number
          format: double
          example: 159.98

    CartResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        userId:
          type: integer
          format: int64
          example: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'
        totalAmount:
          type: number
          format: double
          example: 159.98

    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        user:
          $ref: '#/components/schemas/User'
        status:
          type: string
          example: PENDING
        totalAmount:
          type: number
          format: double
          example: 159.98
        shippingAddress:
          type: string
          example: 123 Main St, Springfield, IL
        paymentIntentId:
          type: string
          example: pi_3MlL5jLkdIwOg7sG0qZ
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        product:
          $ref: '#/components/schemas/Product'
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: double
          example: 79.99

    OrderItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        productId:
          type: integer
          format: int64
          example: 1
        productName:
          type: string
          example: Wireless Bluetooth Headphones
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: double
          example: 79.99

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        userId:
          type: integer
          format: int64
          example: 1
        status:
          type: string
          example: PENDING
        totalAmount:
          type: number
          format: double
          example: 159.98
        shippingAddress:
          type: string
          example: 123 Main St, Springfield, IL
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: john.doe@example.com
        name:
          type: string
          example: John Doe
        role:
          type: string
          example: USER
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    PageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 10
        totalElements:
          type: integer
          example: 50
        totalPages:
          type: integer
          example: 5
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed
        path:
          type: string
          example: /api/products
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
