openapi: 3.0.3
info:
  title: SaaS Platform API
  version: 1.0.0
  description: SaaS platform API for tenant management, usage tracking, and billing/invoicing.
  contact:
    name: Java by BroCode
    url: https://github.com/anomalyco/collection_of_Courses

servers:
  - url: http://localhost:8080
    description: Development server

tags:
  - name: Tenants
    description: Tenant lifecycle management
  - name: Usage
    description: Usage tracking and reporting
  - name: Billing
    description: Invoice generation and payment

paths:
  /api/tenants:
    get:
      summary: List all tenants
      operationId: listTenants
      tags:
        - Tenants
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/TenantDTO'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create a new tenant
      operationId: createTenant
      tags:
        - Tenants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/tenants/{tenantId}:
    get:
      summary: Get tenant by tenant ID
      operationId: getTenantByTenantId
      tags:
        - Tenants
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            example: acme-corp
      responses:
        '200':
          description: Tenant found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/tenants/{tenantId}/activate:
    post:
      summary: Activate a tenant
      operationId: activateTenant
      tags:
        - Tenants
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/tenants/{tenantId}/suspend:
    post:
      summary: Suspend a tenant
      operationId: suspendTenant
      tags:
        - Tenants
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/tenants/{tenantId}/cancel:
    post:
      summary: Cancel a tenant
      operationId: cancelTenant
      tags:
        - Tenants
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/tenants/{tenantId}/plan:
    put:
      summary: Change tenant subscription plan
      operationId: changeTenantPlan
      tags:
        - Tenants
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: plan
          in: query
          required: true
          schema:
            type: string
            enum:
              - FREE
              - PRO
              - ENTERPRISE
      responses:
        '200':
          description: Plan changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/usage:
    post:
      summary: Record a usage metric
      operationId: recordUsage
      tags:
        - Usage
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: metric
          in: query
          required: true
          schema:
            type: string
            example: api_requests
        - name: value
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Usage recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageRecordDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      summary: Get usage records for a tenant and metric
      operationId: getUsage
      tags:
        - Usage
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: metric
          in: query
          required: true
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Usage records
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/UsageRecordDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/usage/total:
    get:
      summary: Get total usage for a tenant and metric in a time range
      operationId: getTotalUsage
      tags:
        - Usage
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: metric
          in: query
          required: true
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Total usage count
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 15000
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/billing/invoice:
    post:
      summary: Generate an invoice for a tenant
      operationId: generateInvoice
      tags:
        - Billing
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: plan
          in: query
          required: true
          schema:
            type: string
            enum:
              - FREE
              - PRO
              - ENTERPRISE
      responses:
        '200':
          description: Invoice generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/billing/pay/{invoiceNumber}:
    post:
      summary: Process payment for an invoice
      operationId: payInvoice
      tags:
        - Billing
      parameters:
        - name: invoiceNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    Tenant:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        tenantId:
          type: string
          example: acme-corp
        name:
          type: string
          example: Acme Corporation
        plan:
          $ref: '#/components/schemas/SubscriptionPlan'
        status:
          $ref: '#/components/schemas/TenantStatus'
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00
        updatedAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    TenantDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        tenantId:
          type: string
          example: acme-corp
        name:
          type: string
          example: Acme Corporation
        plan:
          type: string
          enum:
            - FREE
            - PRO
            - ENTERPRISE
          example: PRO
        status:
          type: string
          enum:
            - ACTIVE
            - SUSPENDED
            - CANCELLED
          example: ACTIVE
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00
        updatedAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    CreateTenantRequest:
      type: object
      required:
        - tenantId
        - name
        - plan
      properties:
        tenantId:
          type: string
          example: acme-corp
        name:
          type: string
          example: Acme Corporation
        plan:
          type: string
          enum:
            - FREE
            - PRO
            - ENTERPRISE
          example: PRO

    SubscriptionPlan:
      type: string
      enum:
        - FREE
        - PRO
        - ENTERPRISE

    TenantStatus:
      type: string
      enum:
        - ACTIVE
        - SUSPENDED
        - CANCELLED

    UsageRecordDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        tenantId:
          type: string
          example: acme-corp
        metric:
          type: string
          example: api_requests
        value:
          type: integer
          format: int64
          example: 150
        recordedAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    InvoiceDTO:
      type: object
      properties:
        invoiceNumber:
          type: string
          example: INV-2026-001
        tenantId:
          type: string
          example: acme-corp
        plan:
          type: string
          example: PRO
        amount:
          type: number
          format: double
          example: 49.99
        issuedDate:
          type: string
          format: date
          example: 2026-01-15
        dueDate:
          type: string
          format: date
          example: 2026-02-14
        status:
          type: string
          example: PENDING

    PlanFeatures:
      type: object
      properties:
        plan:
          type: string
          example: PRO
        features:
          type: array
          items:
            type: string
          example:
            - API_ACCESS
            - ADVANCED_ANALYTICS
            - PRIORITY_SUPPORT
            - WEBHOOKS
        maxUsers:
          type: integer
          example: 50
        maxStorageGb:
          type: integer
          example: 50
        requestsPerMinute:
          type: integer
          example: 500

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Invalid tenant ID
        path:
          type: string
          example: /api/tenants
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
