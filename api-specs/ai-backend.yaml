openapi: 3.0.3
info:
  title: AI Backend API
  version: 1.0.0
  description: AI backend service providing chat completions, summarization, content moderation, document ingestion, and SSE streaming.
  contact:
    name: Java by BroCode
    url: https://github.com/anomalyco/collection_of_Courses

servers:
  - url: http://localhost:8080
    description: Development server

tags:
  - name: AI
    description: AI completion and moderation endpoints
  - name: Documents
    description: Document ingestion and management

paths:
  /api/ai/chat/completions:
    post:
      summary: Get chat completion
      operationId: chatCompletion
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/ai/chat/stream:
    post:
      summary: Stream chat completion via SSE
      operationId: streamChat
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE stream of chat completion
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream
                example: "event: message\ndata: {\"reply\":\"Hello!\"}\n\n"
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/ai/summarization:
    post:
      summary: Summarize text
      operationId: summarizeText
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummarizeRequest'
      responses:
        '200':
          description: Summarization result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/ai/moderation:
    post:
      summary: Moderate content
      operationId: moderateContent
      tags:
        - AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  example: Some content to moderate
              required:
                - text
      responses:
        '200':
          description: Moderation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/documents/ingest:
    post:
      summary: Ingest a document
      operationId: ingestDocument
      tags:
        - Documents
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Document file to ingest
              required:
                - file
      responses:
        '201':
          description: Document ingested successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    ChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: What is the capital of France?
        systemPrompt:
          type: string
          example: You are a helpful assistant.
        temperature:
          type: number
          format: double
          example: 0.7
          minimum: 0
          maximum: 2

    ChatResponse:
      type: object
      properties:
        reply:
          type: string
          example: The capital of France is Paris.
        tokensUsed:
          type: integer
          format: int64
          example: 42
        model:
          type: string
          example: gpt-4

    SummarizeRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          example: Long article text to be summarized...
        maxLength:
          type: integer
          example: 200
        style:
          type: string
          example: concise

    ModerationResult:
      type: object
      properties:
        flagged:
          type: boolean
          example: false
        scores:
          type: object
          additionalProperties:
            type: number
            format: double
          example:
            hate: 0.001
            harassment: 0.002
            violence: 0.001
        message:
          type: string
          example: Content is safe

    Document:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        filename:
          type: string
          example: research_paper.pdf
        content:
          type: string
          description: Extracted text content
          example: Full extracted text content...
        contentType:
          type: string
          example: application/pdf
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Validation failed
        path:
          type: string
          example: /api/ai/chat/completions
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
