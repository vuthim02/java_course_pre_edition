openapi: 3.0.3
info:
  title: Real-time Chat API
  version: 1.0.0
  description: Real-time chat platform with STOMP WebSocket messaging and REST endpoints for room management.
  contact:
    name: Java by BroCode
    url: https://github.com/anomalyco/collection_of_Courses

servers:
  - url: http://localhost:8080
    description: Development server

x-stompWebSocket:
  endpoint: /ws
  applicationDestinationPrefix: /app
  brokerDestinations:
    - /topic
    - /queue
  userDestinationPrefix: /user
  stompEndpoints:
    - destination: /app/chat.send
      description: Send a chat message
      payload:
        $ref: '#/components/schemas/ChatMessageRequest'
      subscription: /topic/room/{roomId}
    - destination: /app/chat.typing
      description: Signal typing indicator
      payload:
        $ref: '#/components/schemas/ChatMessageRequest'
      subscription: /topic/room/{roomId}/typing
    - destination: /app/chat.join
      description: Join a chat room
      payload:
        $ref: '#/components/schemas/ChatMessageRequest'
      subscription: /topic/room/{roomId}
    - destination: /app/chat.leave
      description: Leave a chat room
      payload:
        $ref: '#/components/schemas/ChatMessageRequest'
      subscription: /topic/room/{roomId}

paths:
  /api/rooms:
    get:
      summary: Get all chat rooms
      operationId: getAllRooms
      tags:
        - Rooms
      responses:
        '200':
          description: List of chat rooms
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/ChatRoom'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create a new chat room
      operationId: createRoom
      tags:
        - Rooms
      parameters:
        - name: roomId
          in: query
          required: true
          schema:
            type: string
            example: general
        - name: name
          in: query
          required: true
          schema:
            type: string
            example: General Chat
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatRoom'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/rooms/{roomId}/messages:
    get:
      summary: Get paginated messages for a room
      operationId: getMessages
      tags:
        - Messages
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
            example: general
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Paginated messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/rooms/{roomId}/history:
    get:
      summary: Get full chat history for a room
      operationId: getChatHistory
      tags:
        - Messages
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
            example: general
      responses:
        '200':
          description: Full chat history
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/ChatMessage'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    ChatRoom:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        roomId:
          type: string
          example: general
        name:
          type: string
          example: General Chat
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        roomId:
          type: string
          example: general
        sender:
          type: string
          example: john_doe
        content:
          type: string
          example: Hello everyone!
        type:
          type: string
          enum:
            - CHAT
            - JOIN
            - LEAVE
          example: CHAT
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    ChatMessageRequest:
      type: object
      properties:
        roomId:
          type: string
          example: general
        sender:
          type: string
          example: john_doe
        content:
          type: string
          example: Hello everyone!
        type:
          type: string
          example: CHAT

    ChatMessageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        roomId:
          type: string
          example: general
        sender:
          type: string
          example: john_doe
        content:
          type: string
          example: Hello everyone!
        type:
          type: string
          example: CHAT
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    PageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 50
        totalElements:
          type: integer
          example: 200
        totalPages:
          type: integer
          example: 4
        first:
          type: boolean
          example: true
        last:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Invalid room ID
        path:
          type: string
          example: /api/rooms
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
