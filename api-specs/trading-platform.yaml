openapi: 3.0.3
info:
  title: Trading Platform API
  version: 1.0.0
  description: Trading platform API for order management, portfolio tracking, account management, and WebSocket market data.
  contact:
    name: Java by BroCode
    url: https://github.com/anomalyco/collection_of_Courses

servers:
  - url: http://localhost:8080
    description: Development server

x-marketDataWebSocket:
  description: STOMP WebSocket for real-time market data
  endpoint: /ws/market
  topics:
    - /topic/prices
    - /topic/prices/{symbol}
    - /topic/orders/{userId}

tags:
  - name: Orders
    description: Trade order management
  - name: Portfolio
    description: Portfolio tracking
  - name: Account
    description: Account management

paths:
  /api/orders:
    post:
      summary: Place a new order
      operationId: placeOrder
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequest'
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      summary: Get all orders for a user
      operationId: getUserOrders
      tags:
        - Orders
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User's orders
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/OrderResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/orders/{orderId}:
    get:
      summary: Get order by ID
      operationId: getOrderById
      tags:
        - Orders
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/orders/{orderId}/cancel:
    post:
      summary: Cancel an order
      operationId: cancelOrder
      tags:
        - Orders
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/portfolio:
    get:
      summary: Get portfolio for a user
      operationId: getPortfolio
      tags:
        - Portfolio
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Portfolio holdings
          content:
            application/json:
              type: array
              items:
                $ref: '#/components/schemas/PortfolioResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/portfolio/{userId}/summary:
    get:
      summary: Get portfolio summary for a user
      operationId: getPortfolioSummary
      tags:
        - Portfolio
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Portfolio summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalValue:
                    type: number
                    format: double
                    example: 125000.50
                  totalProfitLoss:
                    type: number
                    format: double
                    example: 12500.75
                  holdings:
                    type: integer
                    example: 5
        '500':
          $ref: '#/components/responses/InternalError'

  /api/account:
    get:
      summary: Get account details
      operationId: getAccount
      tags:
        - Account
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/account/deposit:
    post:
      summary: Deposit funds
      operationId: depositFunds
      tags:
        - Account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  format: int64
                amount:
                  type: number
                  format: double
              required:
                - userId
                - amount
      responses:
        '200':
          description: Deposit successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number
                    format: double
                    example: 50000.00
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/account/withdraw:
    post:
      summary: Withdraw funds
      operationId: withdrawFunds
      tags:
        - Account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                  format: int64
                amount:
                  type: number
                  format: double
              required:
                - userId
                - amount
      responses:
        '200':
          description: Withdrawal successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number
                    format: double
                    example: 45000.00
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    OrderRequest:
      type: object
      required:
        - symbol
        - orderType
        - side
        - quantity
        - userId
      properties:
        symbol:
          type: string
          example: AAPL
        orderType:
          type: string
          enum:
            - MARKET
            - LIMIT
            - STOP
          example: LIMIT
        side:
          type: string
          enum:
            - BUY
            - SELL
          example: BUY
        quantity:
          type: number
          format: double
          example: 100.0
        price:
          type: number
          format: double
          example: 150.50
        stopPrice:
          type: number
          format: double
          example: 145.00
        userId:
          type: integer
          format: int64
          example: 1

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        symbol:
          type: string
          example: AAPL
        orderType:
          type: string
          enum:
            - MARKET
            - LIMIT
            - STOP
          example: LIMIT
        side:
          type: string
          enum:
            - BUY
            - SELL
          example: BUY
        quantity:
          type: number
          format: double
          example: 100.0
        price:
          type: number
          format: double
          example: 150.50
        stopPrice:
          type: number
          format: double
          example: 145.00
        filledQuantity:
          type: number
          format: double
          example: 0.0
        status:
          type: string
          enum:
            - PENDING
            - FILLED
            - PARTIALLY_FILLED
            - CANCELLED
            - REJECTED
          example: PENDING
        userId:
          type: integer
          format: int64
          example: 1
        createdAt:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    PortfolioResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        userId:
          type: integer
          format: int64
          example: 1
        symbol:
          type: string
          example: AAPL
        quantity:
          type: number
          format: double
          example: 50.0
        avgCost:
          type: number
          format: double
          example: 145.30
        currentPrice:
          type: number
          format: double
          example: 150.50
        totalValue:
          type: number
          format: double
          example: 7525.00
        profitLoss:
          type: number
          format: double
          example: 260.00

    MarketPrice:
      type: object
      properties:
        symbol:
          type: string
          example: AAPL
        bid:
          type: number
          format: double
          example: 150.45
        ask:
          type: number
          format: double
          example: 150.55
        last:
          type: number
          format: double
          example: 150.50
        changePercent:
          type: number
          format: double
          example: 1.25
        volume:
          type: integer
          format: int64
          example: 12500000
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

    Account:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        userId:
          type: integer
          format: int64
          example: 1
        balance:
          type: number
          format: double
          example: 100000.00
        buyingPower:
          type: number
          format: double
          example: 100000.00
        equity:
          type: number
          format: double
          example: 107525.00

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Insufficient funds
        path:
          type: string
          example: /api/orders
        timestamp:
          type: string
          format: date-time
          example: 2026-01-15T10:30:00

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
