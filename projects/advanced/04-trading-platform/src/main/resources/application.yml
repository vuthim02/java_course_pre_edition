server:
  port: 8080

spring:
  application:
    name: trading-platform
  datasource:
    url: jdbc:h2:mem:tradingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    order-topic: order-events
    market-data-topic: market-data

logging:
  level:
    com.trading: DEBUG
