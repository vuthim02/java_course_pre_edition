server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:k8s-system}
  datasource:
    url: jdbc:h2:mem:k8sdemo
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  lifecycle:
    timeout-per-shutdown-phase: 30s

# PostgreSQL production config (uncomment and comment H2 above to use)
#  datasource:
#    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:k8sdemo}
#    username: ${DB_USERNAME:postgres}
#    password: ${DB_PASSWORD:postgres}
