#  jpa:
#    hibernate:
#      ddl-auto: update
#    properties:
#      hibernate:
#        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,configprops
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,readinessHealth
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: @project.version@

app:
  version: @project.version@

leader:
  election:
    interval: 10000
  lease:
    duration: 30
