apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-system-app
  labels:
    app: k8s-system-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: k8s-system-app
  template:
    metadata:
      labels:
        app: k8s-system-app
    spec:
      containers:
        - name: app
          image: k8s-system-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: db-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
