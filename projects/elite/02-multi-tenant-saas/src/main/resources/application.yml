server:
  port: 8080

spring:
  application:
    name: multi-tenant-saas
  datasource:
    url: jdbc:h2:mem:saasdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.saas: DEBUG
    org.springframework.security: INFO

tenant:
  header-name: X-Tenant-Id
  default-tier: FREE

rate-limiting:
  enabled: true
  default-limit: 100
  default-window-seconds: 60
