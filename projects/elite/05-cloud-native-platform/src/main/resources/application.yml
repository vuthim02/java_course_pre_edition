server:
  port: 8080

operator:
  namespace: default
  resync-interval-ms: 30000
  termination-grace-period-seconds: 10

kubernetes:
  master-url: https://kubernetes.default.svc
  namespace: default
  trust-certs: true

logging:
  level:
    com.cloudnative: DEBUG
    io.javaoperatorsdk: INFO
    io.fabric8.kubernetes: INFO
