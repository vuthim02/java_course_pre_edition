server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/users
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderServiceCircuitBreaker
                fallbackUri: forward:/fallback/orders
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
      default-filters:
        - name: AuthAggregation
        - DedupeResponseHeader=Access-Control-Allow-Origin

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/auth/realms/elite
          jwk-set-uri: http://localhost:8085/auth/realms/elite/protocol/openid-connect/certs

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      userServiceCircuitBreaker:
        base-config: default
      orderServiceCircuitBreaker:
        base-config: default

logging:
  level:
    com.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO

rate-limiting:
  default-limit: 100
  default-window-seconds: 60
